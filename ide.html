<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum IDE — .sa Extension. We Don't Know Either.</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090d;--surface:#0b1018;--card:#0f1923;--border:#1a2a3a;
  --accent:#00e5ff;--green:#00ff9d;--red:#ff3d5a;--yellow:#ffd600;
  --purple:#c084fc;--orange:#ff6b35;--text:#d0dce8;--dim:#546070;
  --mono:'JetBrains Mono',monospace;--display:'Bebas Neue',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)}

/* ─── NAV ─── */
nav{flex-shrink:0;z-index:300;background:rgba(6,9,13,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:50px}
.nav-logo{font-family:var(--display);font-size:1.4rem;letter-spacing:4px;color:var(--accent);text-decoration:none;text-shadow:0 0 18px rgba(0,229,255,.35)}
.nav-logo span{color:var(--purple);font-size:1rem}
.nav-links{display:flex;align-items:center;gap:.2rem}
.nav-link{font-family:var(--mono);font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-decoration:none;padding:0 .9rem;height:50px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--purple);border-bottom-color:var(--purple)}
.nav-cta{font-family:var(--mono);font-size:.58rem;letter-spacing:2px;text-transform:uppercase;background:var(--accent);color:#000;font-weight:700;padding:6px 13px;text-decoration:none;margin-left:.5rem;transition:all .2s;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.nav-cta:hover{background:#fff}
.nav-status{font-size:.58rem;letter-spacing:1px;color:var(--dim);display:flex;align-items:center;gap:.5rem}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── IDE SHELL ─── */
.ide-shell{flex:1;display:flex;overflow:hidden;min-height:0}

/* ─── FILE TREE ─── */
.file-tree{width:200px;flex-shrink:0;border-right:1px solid var(--border);background:#08101a;display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:.6rem 1rem;border-bottom:1px solid var(--border);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem;padding:0 2px;transition:color .2s}
.panel-header-btn:hover{color:var(--accent)}
.file-list{flex:1;overflow-y:auto;padding:.3rem 0}
.file-item{display:flex;align-items:center;gap:.5rem;padding:.45rem 1rem;cursor:pointer;font-size:.68rem;color:var(--dim);transition:all .15s;border-left:2px solid transparent}
.file-item:hover{background:rgba(0,229,255,.04);color:var(--text)}
.file-item.active{color:var(--accent);background:rgba(0,229,255,.06);border-left-color:var(--accent)}
.file-icon{font-size:.8rem;flex-shrink:0}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-ext{font-size:.55rem;color:var(--accent)}
.file-new-btn{margin:.5rem .8rem;padding:.45rem .6rem;background:rgba(0,229,255,.06);border:1px dashed rgba(0,229,255,.2);color:var(--dim);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .2s;letter-spacing:1px;text-align:left}
.file-new-btn:hover{color:var(--accent);border-color:var(--accent)}

/* ─── EDITOR PANE ─── */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:#08101a;overflow-x:auto;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:3px}.tab-bar::-webkit-scrollbar-track{background:transparent}.tab-bar::-webkit-scrollbar-thumb{background:var(--border)}
.editor-tab{display:flex;align-items:center;gap:.5rem;padding:0 1.2rem;height:38px;font-size:.65rem;color:var(--dim);cursor:pointer;border-right:1px solid var(--border);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;background:transparent;flex-shrink:0}
.editor-tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.editor-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:#0b1520}
.editor-tab .tab-close{opacity:0;color:var(--dim);font-size:.7rem;margin-left:.3rem;line-height:1;padding:0 2px;background:none;border:none;cursor:pointer;font-family:var(--mono)}
.editor-tab:hover .tab-close{opacity:1}
.editor-tab .tab-close:hover{color:var(--red)}
.editor-tab .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0}

/* ─── CODE EDITOR ─── */
.editor-area{flex:1;display:flex;overflow:hidden;position:relative;background:#060c14}
.line-numbers{padding:1rem 0;background:#070d16;border-right:1px solid var(--border);text-align:right;font-size:.8rem;line-height:1.6;color:#2a3a4a;user-select:none;overflow:hidden;flex-shrink:0;min-width:48px}
.line-numbers span{display:block;padding:0 .8rem}
.code-editor{flex:1;position:relative;overflow:hidden}
textarea#codeInput{position:absolute;inset:0;width:100%;height:100%;padding:1rem 1.2rem;background:transparent;border:none;outline:none;color:transparent;caret-color:var(--accent);font-family:var(--mono);font-size:.8rem;line-height:1.6;resize:none;z-index:2;white-space:pre;overflow-wrap:normal;overflow-x:auto}
textarea#codeInput::selection{background:rgba(0,229,255,.18)}
.highlight-layer{position:absolute;inset:0;padding:1rem 1.2rem;font-family:var(--mono);font-size:.8rem;line-height:1.6;pointer-events:none;white-space:pre;overflow:hidden;z-index:1;overflow-x:auto}
/* ─── Syntax Highlight Colors ─── */
.hl-kw{color:#ff79c6}
.hl-str{color:#ffd600}
.hl-num{color:#c084fc}
.hl-cm{color:#394655;font-style:italic}
.hl-fn{color:#00ff9d}
.hl-type{color:#8be9fd}
.hl-self{color:#00e5ff}
.hl-op{color:#ff79c6}
.hl-id{color:#d0dce8}

/* ─── TOOLBAR ─── */
.toolbar{flex-shrink:0;display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:#070d16;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.tool-btn{font-family:var(--mono);font-size:.62rem;letter-spacing:1px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);padding:6px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.tool-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.tool-btn.run{background:rgba(0,255,157,.1);border-color:rgba(0,255,157,.3);color:var(--green)}
.tool-btn.run:hover{background:rgba(0,255,157,.2);border-color:var(--green)}
.tool-btn.clear{color:var(--red)}
.tool-btn.clear:hover{color:var(--red);border-color:var(--red);background:rgba(255,61,90,.08)}
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 .2rem}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.run-shortcut{font-size:.58rem;color:var(--dim);letter-spacing:1px}
#execTime{font-size:.58rem;color:var(--dim);letter-spacing:1px}

/* ─── SPLIT VERTICAL ─── */
.right-pane{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden}
.resizer{width:5px;cursor:col-resize;background:transparent;transition:background .2s;flex-shrink:0}
.resizer:hover,.resizer.dragging{background:rgba(0,229,255,.3)}

/* ─── OUTPUT / TERMINAL ─── */
.output-header{flex-shrink:0;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:#08101a;display:flex;align-items:center;gap:.8rem}
.output-tabs{display:flex;gap:0}
.out-tab{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;padding:.3rem .8rem;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--mono);transition:all .2s}
.out-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.out-tab:hover:not(.active){color:var(--text)}
.output-actions{margin-left:auto;display:flex;gap:.3rem}
.output-body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.output-panel{flex:1;overflow-y:auto;padding:1rem 1.2rem;font-family:var(--mono);font-size:.78rem;line-height:1.85;display:none}
.output-panel.active{display:block}
.output-panel::-webkit-scrollbar{width:4px}.output-panel::-webkit-scrollbar-track{background:transparent}.output-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.out-line{display:block;white-space:pre-wrap;word-break:break-all}
.out-line.stdout{color:var(--text)}
.out-line.stderr{color:var(--red)}
.out-line.info{color:var(--dim);font-style:italic}
.out-line.success{color:var(--green)}
.out-line.warn{color:var(--yellow)}
.out-line.prompt{color:var(--accent)}
.out-line.sep{color:var(--border)}
.out-cursor{display:inline-block;width:7px;height:.9em;background:var(--accent);vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ─── INPUT ROW ─── */
.input-row{flex-shrink:0;display:flex;border-top:1px solid var(--border);background:#070d16}
.input-prompt{padding:.6rem .8rem;color:var(--green);font-size:.8rem;border-right:1px solid var(--border);display:flex;align-items:center}
.stdin-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:.78rem;padding:.6rem .8rem}
.stdin-input::placeholder{color:var(--border)}
.stdin-send{padding:.6rem .8rem;background:none;border:none;border-left:1px solid var(--border);color:var(--dim);cursor:pointer;font-family:var(--mono);font-size:.65rem;transition:all .2s}
.stdin-send:hover{color:var(--green)}

/* ─── EXAMPLES PANEL ─── */
.ex-panel{padding:.8rem;overflow-y:auto}
.ex-panel::-webkit-scrollbar{width:4px}.ex-panel::-webkit-scrollbar-track{background:transparent}.ex-panel::-webkit-scrollbar-thumb{background:var(--border)}
.ex-group{margin-bottom:1.2rem}
.ex-group-title{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding:.2rem .3rem;margin-bottom:.4rem}
.ex-item{display:block;padding:.5rem .7rem;font-size:.68rem;color:var(--dim);cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:2px;background:rgba(255,255,255,.02)}
.ex-item:hover{color:var(--text);border-color:var(--border);background:rgba(0,229,255,.04)}
.ex-item .ex-name{color:var(--accent)}
.ex-item .ex-desc{display:block;font-size:.6rem;color:var(--dim);margin-top:.15rem}

/* ─── MOBILE ─── */
@media(max-width:700px){
  .file-tree{display:none}
  .right-pane{width:100%;position:fixed;bottom:0;left:0;right:0;height:45vh;border-left:none;border-top:1px solid var(--border)}
  .ide-shell{flex-direction:column}
  .editor-pane{flex:1;min-height:0}
  .resizer{display:none}
  nav .nav-links{display:none}
}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);padding:.7rem 1.5rem;font-size:.72rem;letter-spacing:1px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

          placeholder="# Write your Quantum code here..."></textarea>

<script>
// ═══════════════════════════════════════════════════════════════════
//  QUANTUM LANGUAGE INTERPRETER — JavaScript port from C++17 source
// ═══════════════════════════════════════════════════════════════════

// ─── LEXER ──────────────────────────────────────────────────────────
const KEYWORDS = new Set([
  'let','const','fn','def','function','class','extends','new','this','self',
  'super','return','if','else','elif','while','for','in','of','break','continue',
  'raise','throw','try','except','catch','finally','as','print','printf','input',
  'scanf','cout','cin','import','from','true','True','false','False','nil','null',
  'undefined','None','and','or','not','is','int','float','double','char','string',
  'bool','void','long','short','unsigned','scan','payload','encrypt','decrypt',
  'hash','lambda','static','endl','pass'
]);

const TYPE_KW = new Set(['int','float','double','char','string','bool','void','long','short','unsigned']);

function tokenize(src) {
  const tokens = [];
  let pos = 0, line = 1, col = 1;

  function cur() { return pos < src.length ? src[pos] : '\0'; }
  function peek(n=1) { return pos+n < src.length ? src[pos+n] : '\0'; }
  function adv() {
    const c = src[pos++];
    if (c==='\n'){line++;col=1;}else col++;
    return c;
  }

  while (pos < src.length) {
    // skip whitespace (not newlines)
    while (pos < src.length && (cur()===' '||cur()==='\t'||cur()==='\r')) adv();
    if (pos >= src.length) break;

    const sl = line, sc = col;
    const c = adv();

    if (c === '\n') { tokens.push({type:'NEWLINE',val:'\n',line:sl,col:sc}); continue; }

    // comments
    if (c==='#') { while (pos<src.length && cur()!=='\n') adv(); continue; }
    if (c==='/' && cur()==='/') { while (pos<src.length && cur()!=='\n') adv(); continue; }
    if (c==='/' && cur()==='*') {
      adv();
      while (pos<src.length && !(cur()==='*' && peek()==='/')) adv();
      if (pos<src.length){adv();adv();}
      continue;
    }

    // strings
    if (c==='"' || c==="'") {
      let s='', q=c;
      while (pos<src.length && cur()!==q) {
        if (cur()==='\\'){adv();const e=adv();s+=e==='\n'?'\n':e==='\t'?'\t':e==='n'?'\n':e==='t'?'\t':e;}
        else s+=adv();
      }
      if (pos<src.length) adv();
      tokens.push({type:'STRING',val:s,line:sl,col:sc});
      continue;
    }

    // template literals
    if (c==='`') {
      let parts=[],seg='';
      while (pos<src.length && cur()!=='`') {
        if (cur()==='\\'){adv();seg+=adv();}
        else if (cur()==='$' && peek()==='{') {
          parts.push({isExpr:false,val:seg});seg='';
          adv();adv(); // $ {
          let expr='',depth=1;
          while(pos<src.length && depth>0){
            if(cur()==='{')depth++;
            else if(cur()==='}'){if(--depth===0){adv();break;}}
            expr+=adv();
          }
          parts.push({isExpr:true,val:expr});
        } else seg+=adv();
      }
      if(pos<src.length)adv();
      parts.push({isExpr:false,val:seg});
      tokens.push({type:'TEMPLATE',parts,line:sl,col:sc});
      continue;
    }

    // numbers
    if (/[0-9]/.test(c) || (c==='.' && /[0-9]/.test(cur()))) {
      let n=c;
      if (c==='0' && (cur()==='x'||cur()==='X')) {
        n+=adv(); while(/[0-9a-fA-F]/.test(cur()))n+=adv();
      } else {
        let hasDot = c==='.';
        while (pos<src.length && (/[0-9]/.test(cur())||(cur()==='.'&&!hasDot))) {
          if(cur()==='.') hasDot=true;
          n+=adv();
        }
      }
      tokens.push({type:'NUMBER',val:n,line:sl,col:sc});
      continue;
    }

    // identifiers / keywords
    if (/[a-zA-Z_$]/.test(c)) {
      let id=c;
      while(pos<src.length && /[a-zA-Z0-9_$]/.test(cur())) id+=adv();
      const type = KEYWORDS.has(id) ? id.toUpperCase() : 'IDENT';
      const mapped = {
        'SELF':'THIS','DEF':'FN','FUNCTION':'FN','PRINTF':'PRINT','SCANF':'INPUT',
        'THROW':'RAISE','CATCH':'EXCEPT','TRUE':'BOOL_TRUE','FALSE':'BOOL_FALSE',
        'TRUE_PY':'BOOL_TRUE','FALSE_PY':'BOOL_FALSE',
        'NULL':'NIL','UNDEFINED':'NIL','NONE':'NIL',
        'AND':'AND','OR':'OR','NOT':'NOT','ENDL':'IDENT',
        'PASS':'PASS',
      };
      const finalType = mapped[type] || type;
      // special cases
      const ft2 = id==='True'?'BOOL_TRUE':id==='False'?'BOOL_FALSE':id==='None'?'NIL':
                  id==='null'?'NIL':id==='undefined'?'NIL':id==='self'?'THIS':
                  id==='def'?'FN':id==='function'?'FN':id==='printf'?'PRINT':
                  id==='throw'?'RAISE':id==='catch'?'EXCEPT':id==='or'?'OR':
                  id==='and'?'AND':id==='not'?'NOT':id==='lambda'?'LAMBDA':
                  id==='static'?'STATIC':id==='pass'?'PASS':
                  KEYWORDS.has(id)?id.toUpperCase():'IDENT';
      tokens.push({type:ft2,val:id,line:sl,col:sc});
      continue;
    }

    // operators & punctuation
    const two = c + cur();
    if (two==='==') { adv(); tokens.push({type:'EQEQ',val:'==',line:sl,col:sc}); continue; }
    if (two==='!=') { adv(); tokens.push({type:'NEQ',val:'!=',line:sl,col:sc}); continue; }
    if (two==='<=') { adv(); tokens.push({type:'LEQ',val:'<=',line:sl,col:sc}); continue; }
    if (two==='>=') { adv(); tokens.push({type:'GEQ',val:'>=',line:sl,col:sc}); continue; }
    if (two==='&&') { adv(); tokens.push({type:'AND',val:'&&',line:sl,col:sc}); continue; }
    if (two==='||') { adv(); tokens.push({type:'OR',val:'||',line:sl,col:sc}); continue; }
    if (two==='**') { adv(); tokens.push({type:'POW',val:'**',line:sl,col:sc}); continue; }
    if (two==='//') { while(pos<src.length&&cur()!=='\n')adv(); continue; } // already handled above but safety
    if (two==='+=') { adv(); tokens.push({type:'PLUS_EQ',val:'+=',line:sl,col:sc}); continue; }
    if (two==='-=') { adv(); tokens.push({type:'MINUS_EQ',val:'-=',line:sl,col:sc}); continue; }
    if (two==='*=') { adv(); tokens.push({type:'STAR_EQ',val:'*=',line:sl,col:sc}); continue; }
    if (two==='/=') { adv(); tokens.push({type:'SLASH_EQ',val:'/=',line:sl,col:sc}); continue; }
    if (two==='%=') { adv(); tokens.push({type:'MOD_EQ',val:'%=',line:sl,col:sc}); continue; }
    if (two==='++') { adv(); tokens.push({type:'PLUS_PLUS',val:'++',line:sl,col:sc}); continue; }
    if (two==='--') { adv(); tokens.push({type:'MINUS_MINUS',val:'--',line:sl,col:sc}); continue; }
    if (two==='->') { adv(); tokens.push({type:'ARROW_OP',val:'->',line:sl,col:sc}); continue; }
    if (two==='<<') { adv(); tokens.push({type:'LSHIFT',val:'<<',line:sl,col:sc}); continue; }
    if (two==='>>') { adv(); tokens.push({type:'RSHIFT',val:'>>',line:sl,col:sc}); continue; }
    if (two==='??') { adv(); tokens.push({type:'NULL_COAL',val:'??',line:sl,col:sc}); continue; }
    if (two==='?.') { adv(); tokens.push({type:'DOT',val:'.',line:sl,col:sc}); continue; }
    if (two==='=>') { adv(); tokens.push({type:'FAT_ARROW',val:'=>',line:sl,col:sc}); continue; }
    if (two==='===') { adv();adv(); tokens.push({type:'EQEQ',val:'===',line:sl,col:sc}); continue; }

    const singles = {
      '=':'EQ','+':'PLUS','-':'MINUS','*':'STAR','/':'SLASH','%':'PERCENT',
      '<':'LT','>':'GT','!':'BANG','(':'LPAREN',')':'RPAREN','{':'LBRACE',
      '}':'RBRACE','[':'LBRACKET',']':'RBRACKET',',':'COMMA',';':'SEMI',
      ':':'COLON','.':'DOT','&':'AMP','|':'PIPE','^':'CARET','~':'TILDE',
      '?':'QUESTION','@':'AT'
    };
    if (singles[c]) { tokens.push({type:singles[c],val:c,line:sl,col:sc}); continue; }
    // skip unknown
  }
  tokens.push({type:'EOF',val:'',line,col});
  return injectIndentDedent(tokens, src);
}

function injectIndentDedent(raw, src) {
  // compute leading spaces per line
  const lineIndent = {};
  let li=1, indent=0, atStart=true;
  for (let i=0;i<src.length;i++) {
    const c=src[i];
    if(c==='\n'){lineIndent[li]=indent;li++;indent=0;atStart=true;}
    else if(atStart){if(c===' ')indent++;else if(c==='\t')indent+=4;else atStart=false;}
  }
  lineIndent[li]=indent;

  const out=[];
  const stack=[0];
  let braceDepth=0, parenDepth=0;

  for (let i=0;i<raw.length;i++) {
    const tok=raw[i];
    if(tok.type==='LBRACE'||tok.type==='LBRACKET'||tok.type==='LPAREN'){braceDepth++;if(tok.type!=='LBRACE')parenDepth++;}
    else if(tok.type==='RBRACE'||tok.type==='RBRACKET'||tok.type==='RPAREN'){braceDepth=Math.max(0,braceDepth-1);if(tok.type!=='RBRACE')parenDepth=Math.max(0,parenDepth-1);}

    if(tok.type==='NEWLINE'&&parenDepth>0) continue;

    if(tok.type==='COLON'&&braceDepth===0){
      // look ahead past newlines
      let j=i+1;
      while(j<raw.length&&raw[j].type==='NEWLINE')j++;
      if(j<raw.length&&raw[j].type!=='EOF'){
        const ni=lineIndent[raw[j].line]||0;
        if(ni>stack[stack.length-1]){
          out.push(tok);
          for(let k=i+1;k<j;k++)out.push(raw[k]);
          i=j-1;
          stack.push(ni);
          out.push({type:'INDENT',val:'INDENT',line:tok.line,col:tok.col});
          continue;
        }
      }
      out.push(tok);
      continue;
    }

    if(tok.type==='NEWLINE'&&braceDepth===0){
      out.push(tok);
      let j=i+1;
      while(j<raw.length&&raw[j].type==='NEWLINE')j++;
      if(j<raw.length&&raw[j].type!=='EOF'){
        const ni=lineIndent[raw[j].line]||0;
        while(stack.length>1&&ni<stack[stack.length-1]){
          stack.pop();
          out.push({type:'DEDENT',val:'DEDENT',line:tok.line,col:tok.col});
        }
      } else {
        while(stack.length>1){stack.pop();out.push({type:'DEDENT',val:'DEDENT',line:tok.line,col:tok.col});}
      }
      continue;
    }
    out.push(tok);
  }
  return out;
}

// ─── PARSER ──────────────────────────────────────────────────────────
class Parser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos = 0;
  }
  cur() { return this.tokens[this.pos] || {type:'EOF',val:''}; }
  peek(n=1) { return this.tokens[this.pos+n] || {type:'EOF',val:''}; }
  adv() { const t=this.cur(); this.pos++; return t; }
  eat(type) {
    const t=this.cur();
    if(t.type!==type) throw new QError(`Expected ${type} got ${t.type}(${t.val}) at line ${t.line}`);
    return this.adv();
  }
  skipNewlines() { while(this.cur().type==='NEWLINE'||this.cur().type==='SEMI') this.adv(); }
  check(...types) { return types.includes(this.cur().type); }

  parse() {
    const stmts=[];
    this.skipNewlines();
    while(!this.check('EOF')){
      stmts.push(this.parseStmt());
      this.skipNewlines();
    }
    return {type:'Program',stmts};
  }

  parseBlock() {
    this.skipNewlines();
    if(this.check('LBRACE')) {
      this.adv();
      this.skipNewlines();
      const stmts=[];
      while(!this.check('RBRACE')&&!this.check('EOF')){
        stmts.push(this.parseStmt());
        this.skipNewlines();
      }
      this.eat('RBRACE');
      return {type:'Block',stmts};
    }
    if(this.check('INDENT')) {
      this.adv();
      this.skipNewlines();
      const stmts=[];
      while(!this.check('DEDENT')&&!this.check('EOF')){
        stmts.push(this.parseStmt());
        this.skipNewlines();
      }
      if(this.check('DEDENT'))this.adv();
      return {type:'Block',stmts};
    }
    // single stmt
    return {type:'Block',stmts:[this.parseStmt()]};
  }

  parseStmt() {
    this.skipNewlines();
    const t=this.cur();

    if(t.type==='PASS'){this.adv();return{type:'Pass'};}
    if(t.type==='PRINT') return this.parsePrint();
    if(t.type==='RETURN') return this.parseReturn();
    if(t.type==='IF') return this.parseIf();
    if(t.type==='WHILE') return this.parseWhile();
    if(t.type==='FOR') return this.parseFor();
    if(t.type==='FN'||t.type==='LAMBDA') return this.parseFn();
    if(t.type==='CLASS') return this.parseClass();
    if(t.type==='LET'||t.type==='CONST') return this.parseVarDecl();
    if(t.type==='BREAK'){this.adv();return{type:'Break'};}
    if(t.type==='CONTINUE'){this.adv();return{type:'Continue'};}
    if(t.type==='RAISE') return this.parseRaise();
    if(t.type==='TRY') return this.parseTry();
    if(t.type==='IMPORT'||t.type==='FROM') return this.parseImport();
    if(t.type==='STATIC') return this.parseStaticDecl();

    // C++ type hint variable: int x = ...
    if(TYPE_KW.has(t.val)&&this.peek().type==='IDENT'&&(this.peek(2).type==='EQ'||this.peek(2).type==='SEMI'||this.peek(2).type==='NEWLINE')) {
      this.adv(); // skip type
      // check for & ref param
      if(this.cur().type==='AMP') this.adv();
      return this.parseExprStmt();
    }
    // C++ type hint as expr stmt
    if(TYPE_KW.has(t.val)&&this.peek().type==='IDENT') {
      this.adv(); // discard type keyword
      if(this.cur().type==='AMP') this.adv(); // discard & ref
    }

    return this.parseExprStmt();
  }

  parsePrint() {
    this.adv(); // eat print
    const args=[];
    if(this.check('LPAREN')) {
      this.adv();
      if(!this.check('RPAREN')) {
        args.push(this.parseExpr());
        while(this.check('COMMA')){this.adv();args.push(this.parseExpr());}
      }
      if(this.check('RPAREN'))this.adv();
    } else {
      // print without parens
      if(!this.check('NEWLINE')&&!this.check('SEMI')&&!this.check('EOF')) {
        args.push(this.parseExpr());
        while(this.check('COMMA')){this.adv();args.push(this.parseExpr());}
      }
    }
    return {type:'Print',args};
  }

  parseReturn() {
    this.adv();
    if(this.check('NEWLINE')||this.check('SEMI')||this.check('RBRACE')||this.check('DEDENT')||this.check('EOF'))
      return {type:'Return',value:null};
    return {type:'Return',value:this.parseExpr()};
  }

  parseIf() {
    this.adv(); // eat if
    if(this.check('LPAREN')) this.adv();
    const cond=this.parseExpr();
    if(this.check('RPAREN')) this.adv();
    if(this.check('COLON')) this.adv();
    const then=this.parseBlock();
    const elifs=[];
    let elseB=null;
    this.skipNewlines();
    while(this.check('ELIF')||this.check('ELSE')) {
      if(this.cur().type==='ELIF') {
        this.adv();
        if(this.check('LPAREN'))this.adv();
        const ec=this.parseExpr();
        if(this.check('RPAREN'))this.adv();
        if(this.check('COLON'))this.adv();
        elifs.push({cond:ec,body:this.parseBlock()});
        this.skipNewlines();
      } else {
        this.adv();
        if(this.check('COLON'))this.adv();
        elseB=this.parseBlock();
        break;
      }
    }
    return {type:'If',cond,then,elifs,else:elseB};
  }

  parseWhile() {
    this.adv();
    if(this.check('LPAREN'))this.adv();
    const cond=this.parseExpr();
    if(this.check('RPAREN'))this.adv();
    if(this.check('COLON'))this.adv();
    const body=this.parseBlock();
    return {type:'While',cond,body};
  }

  parseFor() {
    this.adv();
    const hasParen=this.check('LPAREN');
    if(hasParen)this.adv();
    // for k, v in / for x of / for x in
    const vars=[];
    vars.push(this.cur().val); this.adv();
    while(this.check('COMMA')){this.adv();vars.push(this.cur().val);this.adv();}
    const iterKw=this.cur().type; // IN or OF
    this.adv();
    const iter=this.parseExpr();
    if(hasParen&&this.check('RPAREN'))this.adv();
    if(this.check('COLON'))this.adv();
    const body=this.parseBlock();
    return {type:'For',vars,iter,body};
  }

  parseFn() {
    const isLambda=this.cur().type==='LAMBDA';
    this.adv();
    let name=null;
    if(this.check('IDENT')){name=this.cur().val;this.adv();}
    if(isLambda){
      // lambda x: expr
      const params=[];
      if(!this.check('COLON')){
        params.push(this.cur().val);this.adv();
        while(this.check('COMMA')){this.adv();params.push(this.cur().val);this.adv();}
      }
      this.eat('COLON');
      const body=this.parseExpr();
      return {type:'Lambda',params,body};
    }
    const params=[],defaults={},paramRefs={};
    if(this.check('LPAREN')){
      this.adv();
      while(!this.check('RPAREN')&&!this.check('EOF')){
        // eat type hints
        if(TYPE_KW.has(this.cur().val)&&this.peek().type==='IDENT'){this.adv();}
        if(TYPE_KW.has(this.cur().val)&&this.peek().type==='AMP'){this.adv();}
        let isRef=false;
        if(this.check('AMP')){isRef=true;this.adv();}
        const pname=this.cur().val; this.adv();
        paramRefs[pname]=isRef;
        params.push(pname);
        if(this.check('EQ')){this.adv();defaults[pname]=this.parseExpr();}
        if(this.check('COMMA'))this.adv();
      }
      if(this.check('RPAREN'))this.adv();
    }
    if(this.check('COLON'))this.adv();
    const body=this.parseBlock();
    return {type:'FnDecl',name,params,defaults,paramRefs,body};
  }

  parseClass() {
    this.adv();
    const name=this.cur().val; this.adv();
    let base=null;
    if(this.check('EXTENDS')){this.adv();base=this.cur().val;this.adv();}
    if(this.check('COLON'))this.adv();
    const body=this.parseBlock();
    return {type:'ClassDecl',name,base,body};
  }

  parseVarDecl() {
    const isConst=this.cur().type==='CONST'; this.adv();
    const name=this.cur().val; this.adv();
    let init=null;
    if(this.check('EQ')){this.adv();init=this.parseExpr();}
    return {type:'VarDecl',name,isConst,init};
  }

  parseRaise() {
    this.adv();
    const val=this.parseExpr();
    return {type:'Raise',val};
  }

  parseTry() {
    this.adv();
    if(this.check('COLON'))this.adv();
    const tryBody=this.parseBlock();
    let catchVar=null, catchBody=null, finallyBody=null;
    this.skipNewlines();
    if(this.check('EXCEPT')) {
      this.adv();
      if(this.check('LPAREN'))this.adv();
      // optional type then optional 'as' name
      if(this.check('IDENT')){
        const maybeType=this.cur().val; this.adv();
        if(this.check('IDENT')){catchVar=this.cur().val;this.adv();}
        else catchVar=maybeType;
      }
      if(this.check('AS')){this.adv();catchVar=this.cur().val;this.adv();}
      if(this.check('RPAREN'))this.adv();
      if(this.check('COLON'))this.adv();
      catchBody=this.parseBlock();
    }
    this.skipNewlines();
    if(this.check('FINALLY')){
      this.adv();
      if(this.check('COLON'))this.adv();
      finallyBody=this.parseBlock();
    }
    return {type:'Try',tryBody,catchVar,catchBody,finallyBody};
  }

  parseImport() {
    // just consume and ignore for browser
    while(!this.check('NEWLINE')&&!this.check('EOF'))this.adv();
    return {type:'Pass'};
  }

  parseStaticDecl() {
    this.adv(); // skip 'static'
    return this.parseStmt();
  }

  parseExprStmt() {
    const expr=this.parseExpr();
    return {type:'ExprStmt',expr};
  }

  parseExpr() { return this.parseTernary(); }

  parseTernary() {
    let left=this.parseAssign();
    if(this.check('QUESTION')){
      this.adv();
      const then=this.parseExpr();
      this.eat('COLON');
      const else_=this.parseExpr();
      return {type:'Ternary',cond:left,then,else:else_};
    }
    return left;
  }

  parseAssign() {
    let left=this.parseNullCoal();
    const assignOps={'EQ':'=','PLUS_EQ':'+=','MINUS_EQ':'-=','STAR_EQ':'*=','SLASH_EQ':'/=','MOD_EQ':'%='};
    if(assignOps[this.cur().type]) {
      const op=assignOps[this.cur().type]; this.adv();
      const right=this.parseExpr();
      return {type:'Assign',op,left,right};
    }
    return left;
  }

  parseNullCoal() {
    let left=this.parseOr();
    while(this.check('NULL_COAL')){this.adv();const r=this.parseOr();left={type:'Binary',op:'??',left,right:r};}
    return left;
  }

  parseOr() {
    let left=this.parseAnd();
    while(this.check('OR')){this.adv();const r=this.parseAnd();left={type:'Binary',op:'||',left,right:r};}
    return left;
  }

  parseAnd() {
    let left=this.parseNot();
    while(this.check('AND')){this.adv();const r=this.parseNot();left={type:'Binary',op:'&&',left,right:r};}
    return left;
  }

  parseNot() {
    if(this.check('NOT')||this.check('BANG')){
      this.adv();return{type:'Unary',op:'!',operand:this.parseNot()};
    }
    return this.parseCompare();
  }

  parseCompare() {
    let left=this.parseBitor();
    const ops={'EQEQ':'==','NEQ':'!=','LT':'<','GT':'>','LEQ':'<=','GEQ':'>='};
    while(ops[this.cur().type]){
      const op=ops[this.cur().type];this.adv();
      const r=this.parseBitor();
      left={type:'Binary',op,left,right:r};
    }
    // 'in' / 'is'
    if(this.check('IN')){this.adv();const r=this.parseBitor();return{type:'Binary',op:'in',left,right:r};}
    if(this.check('IS')){this.adv();return{type:'Binary',op:'==',left,right:this.parseBitor()};}
    return left;
  }

  parseBitor(){let l=this.parseBitxor();while(this.check('PIPE')){this.adv();l={type:'Binary',op:'|',left:l,right:this.parseBitxor()};}return l;}
  parseBitxor(){let l=this.parseBitand();while(this.check('CARET')){this.adv();l={type:'Binary',op:'^',left:l,right:this.parseBitand()};}return l;}
  parseBitand(){let l=this.parseShift();while(this.check('AMP')&&this.peek().type!=='AMP'){this.adv();l={type:'Binary',op:'&',left:l,right:this.parseShift()};}return l;}
  parseShift(){let l=this.parseAdd();while(this.check('LSHIFT')||this.check('RSHIFT')){const op=this.cur().val;this.adv();l={type:'Binary',op,left:l,right:this.parseAdd()};}return l;}

  parseAdd() {
    let left=this.parseMul();
    while(this.check('PLUS')||this.check('MINUS')){
      const op=this.cur().val;this.adv();
      left={type:'Binary',op,left,right:this.parseMul()};
    }
    return left;
  }

  parseMul() {
    let left=this.parsePow();
    while(this.check('STAR')||this.check('SLASH')||this.check('PERCENT')){
      const op=this.cur().val;this.adv();
      left={type:'Binary',op,left,right:this.parsePow()};
    }
    return left;
  }

  parsePow() {
    let left=this.parseUnary();
    if(this.check('POW')){this.adv();return{type:'Binary',op:'**',left,right:this.parsePow()};}
    return left;
  }

  parseUnary() {
    if(this.check('MINUS')){this.adv();return{type:'Unary',op:'-',operand:this.parseUnary()};}
    if(this.check('TILDE')){this.adv();return{type:'Unary',op:'~',operand:this.parseUnary()};}
    if(this.check('AMP')){this.adv();return{type:'AddrOf',operand:this.parseUnary()};}
    if(this.check('STAR')){this.adv();return{type:'Deref',operand:this.parseUnary()};}
    return this.parsePostfix();
  }

  parsePostfix() {
    let expr=this.parsePrimary();
    while(true){
      if(this.check('DOT')){
        this.adv();
        const name=this.cur().val; this.adv();
        if(this.check('LPAREN')){
          const args=this.parseArgs();
          expr={type:'MethodCall',obj:expr,name,args};
        } else {
          expr={type:'Member',obj:expr,name};
        }
      } else if(this.check('ARROW_OP')){
        this.adv();
        const name=this.cur().val; this.adv();
        expr={type:'Arrow',obj:expr,name};
      } else if(this.check('LBRACKET')){
        this.adv();
        // slice check
        let start=null,stop=null,step=null,isSlice=false;
        if(!this.check('COLON')) start=this.parseExpr();
        if(this.check('COLON')){
          isSlice=true; this.adv();
          if(!this.check('RBRACKET')&&!this.check('COLON')) stop=this.parseExpr();
          if(this.check('COLON')){this.adv();if(!this.check('RBRACKET'))step=this.parseExpr();}
        }
        this.eat('RBRACKET');
        if(isSlice) expr={type:'Slice',obj:expr,start,stop,step};
        else expr={type:'Index',obj:expr,index:start};
      } else if(this.check('LPAREN')){
        const args=this.parseArgs();
        expr={type:'Call',callee:expr,args};
      } else if(this.check('PLUS_PLUS')){
        this.adv(); expr={type:'PostIncDec',op:'++',operand:expr};
      } else if(this.check('MINUS_MINUS')){
        this.adv(); expr={type:'PostIncDec',op:'--',operand:expr};
      } else break;
    }
    return expr;
  }

  parseArgs() {
    this.eat('LPAREN');
    const args=[];
    if(!this.check('RPAREN')){
      args.push(this.parseExpr());
      while(this.check('COMMA')){this.adv();if(!this.check('RPAREN'))args.push(this.parseExpr());}
    }
    if(this.check('RPAREN'))this.adv();
    return args;
  }

  parsePrimary() {
    const t=this.cur();

    if(t.type==='NUMBER'){this.adv();return{type:'Num',val:t.val.startsWith('0x')?parseInt(t.val,16):parseFloat(t.val)};}
    if(t.type==='STRING'){this.adv();return{type:'Str',val:t.val};}
    if(t.type==='BOOL_TRUE'){this.adv();return{type:'Bool',val:true};}
    if(t.type==='BOOL_FALSE'){this.adv();return{type:'Bool',val:false};}
    if(t.type==='NIL'){this.adv();return{type:'Nil'};}
    if(t.type==='TEMPLATE'){this.adv();return{type:'Template',parts:t.parts};}

    if(t.type==='IDENT'||t.type==='THIS'){
      this.adv();
      // arrow function: x => ...
      if(this.check('FAT_ARROW')){
        this.adv();
        const body=this.parseExpr();
        return {type:'Lambda',params:[t.val],body};
      }
      return{type:'Ident',name:t.val};
    }

    if(t.type==='LPAREN'){
      this.adv();
      // check for arrow: (x,y) =>
      let savedPos=this.pos;
      try {
        const params=[];
        if(!this.check('RPAREN')){
          if(this.check('IDENT')){params.push(this.cur().val);this.adv();}
          while(this.check('COMMA')&&this.peek().type==='IDENT'){this.adv();params.push(this.cur().val);this.adv();}
        }
        if(this.check('RPAREN')&&this.peek().type==='FAT_ARROW'){
          this.adv(); this.adv(); // ) =>
          const body=this.parseExpr();
          return {type:'Lambda',params,body};
        }
        this.pos=savedPos;
      } catch(e){this.pos=savedPos;}
      const expr=this.parseExpr();
      if(this.check('RPAREN'))this.adv();
      return expr;
    }

    if(t.type==='LBRACKET'){
      this.adv();
      const items=[];
      let isComp=false;
      if(!this.check('RBRACKET')){
        const first=this.parseExpr();
        if(this.check('FOR')){
          // list comprehension
          this.adv();
          const vars=[this.cur().val]; this.adv();
          while(this.check('COMMA')){this.adv();vars.push(this.cur().val);this.adv();}
          this.eat('IN');
          const iter=this.parseExpr();
          let cond=null;
          if(this.check('IF')){this.adv();cond=this.parseExpr();}
          this.eat('RBRACKET');
          return{type:'ListComp',expr:first,vars,iter,cond};
        }
        items.push(first);
        while(this.check('COMMA')){this.adv();if(!this.check('RBRACKET'))items.push(this.parseExpr());}
      }
      this.eat('RBRACKET');
      return{type:'Array',items};
    }

    if(t.type==='LBRACE'){
      this.adv();
      const pairs=[];
      while(!this.check('RBRACE')&&!this.check('EOF')){
        let key;
        if(this.check('STRING')||this.cur().type==='STRING') {key={type:'Str',val:this.cur().val};this.adv();}
        else if(this.check('IDENT')){key={type:'Str',val:this.cur().val};this.adv();}
        else if(this.check('NUMBER')){key={type:'Str',val:this.cur().val};this.adv();}
        else break;
        this.eat('COLON');
        const val=this.parseExpr();
        pairs.push({key,val});
        if(this.check('COMMA'))this.adv();
      }
      this.eat('RBRACE');
      return{type:'Dict',pairs};
    }

    if(t.type==='LAMBDA'){
      return this.parseFn();
    }

    if(t.type==='FN'){
      return this.parseFn();
    }

    // cout << chain
    if(t.type==='COUT'||t.val==='cout'){
      this.adv();
      const args=[];
      while(this.check('LSHIFT')){
        this.adv();
        if(this.check('IDENT')&&this.cur().val==='endl'){this.adv();break;}
        args.push(this.parseExpr());
      }
      return{type:'CoutExpr',args};
    }

    if(t.type==='INPUT'||t.val==='input'||t.val==='scanf'){
      this.adv();
      let prompt=null;
      if(this.check('LPAREN')){
        this.adv();
        if(!this.check('RPAREN'))prompt=this.parseExpr();
        if(this.check('RPAREN'))this.adv();
      }
      return{type:'InputExpr',prompt};
    }

    // new T(args)
    if(t.type==='NEW'){
      this.adv();
      const cls=this.cur().val; this.adv();
      const args=this.check('LPAREN')?this.parseArgs():[];
      return{type:'New',cls,args};
    }

    // super(args)
    if(t.val==='super'){
      this.adv();
      const args=this.check('LPAREN')?this.parseArgs():[];
      return{type:'Super',args};
    }

    // skip stray tokens gracefully
    this.adv();
    return {type:'Nil'};
  }
}

// ─── INTERPRETER ─────────────────────────────────────────────────────
class QError extends Error {
  constructor(msg) { super(msg); this.name='QuantumError'; }
}
class ReturnSignal { constructor(v){this.value=v;} }
class BreakSignal {}
class ContinueSignal {}

class Environment {
  constructor(parent=null) { this.vars=new Map(); this.consts=new Set(); this.parent=parent; }
  define(name, val, isConst=false) { this.vars.set(name,val); if(isConst)this.consts.add(name); }
  get(name) {
    if(this.vars.has(name)) return this.vars.get(name);
    if(this.parent) return this.parent.get(name);
    throw new QError(`NameError: '${name}' is not defined`);
  }
  set(name, val) {
    if(this.vars.has(name)){
      if(this.consts.has(name)) throw new QError(`RuntimeError: Cannot reassign constant '${name}'`);
      this.vars.set(name,val); return;
    }
    if(this.parent){this.parent.set(name,val); return;}
    // auto-define in global
    this.vars.set(name,val);
  }
  has(name) { return this.vars.has(name)||(this.parent?this.parent.has(name):false); }
}

class Interpreter {
  constructor(outputFn, inputFn) {
    this.output = outputFn; // fn(str, type)
    this.inputFn = inputFn; // async fn(prompt) => string
    this.globals = new Environment();
    this.env = this.globals;
    this.steps = 0;
    this.MAX_STEPS = 1_000_000;
    this.registerNatives();
  }

  step() {
    if(++this.steps > this.MAX_STEPS)
      throw new QError('RuntimeError: Step limit exceeded (infinite loop?)');
  }

  registerNatives() {
    const def = (name,fn) => this.globals.define(name, {_native:true,name,fn});
    const defObj = (obj,methods) => {
      const o = {};
      for(const [k,v] of Object.entries(methods)) o[k]={_native:true,name:k,fn:v};
      this.globals.define(obj, o);
    };

    def('len', args => {
      const v=args[0];
      if(typeof v==='string') return v.length;
      if(Array.isArray(v)) return v.length;
      if(v&&typeof v==='object'&&v._dict) return Object.keys(v._dict).length;
      throw new QError('TypeError: len() requires string, array or dict');
    });
    def('range', args => {
      let start=0,stop,step=1;
      if(args.length===1){stop=args[0];}
      else if(args.length===2){start=args[0];stop=args[1];}
      else{start=args[0];stop=args[1];step=args[2];}
      const r=[];
      if(step>0){for(let i=start;i<stop;i+=step)r.push(i);}
      else{for(let i=start;i>stop;i+=step)r.push(i);}
      return r;
    });
    def('type', args => {
      const v=args[0];
      if(v===null||v===undefined) return 'nil';
      if(typeof v==='boolean') return 'bool';
      if(typeof v==='number') return 'number';
      if(typeof v==='string') return 'string';
      if(Array.isArray(v)) return 'array';
      if(v&&v._dict) return 'dict';
      if(v&&v._fn) return 'function';
      if(v&&v._native) return 'native';
      if(v&&v._inst) return 'instance';
      if(v&&v._class) return 'class';
      return 'object';
    });
    def('str', args => this.valToStr(args[0]));
    def('int', args => {
      const v=args[0];
      if(typeof v==='number') return Math.trunc(v);
      if(typeof v==='string') {const n=parseInt(v);if(isNaN(n))throw new QError('ValueError: invalid literal for int');return n;}
      throw new QError('TypeError: cannot convert to int');
    });
    def('float', args => {
      const v=args[0];
      if(typeof v==='number') return v;
      if(typeof v==='string'){const n=parseFloat(v);if(isNaN(n))throw new QError('ValueError: invalid literal');return n;}
      throw new QError('TypeError');
    });
    def('bool', args => this.isTruthy(args[0]));
    def('abs', args => Math.abs(args[0]));
    def('sqrt', args => Math.sqrt(args[0]));
    def('floor', args => Math.floor(args[0]));
    def('ceil', args => Math.ceil(args[0]));
    def('round', args => args.length>1?parseFloat(args[0].toFixed(args[1])):Math.round(args[0]));
    def('pow', args => Math.pow(args[0],args[1]));
    def('max', args => args.length===1&&Array.isArray(args[0])?Math.max(...args[0]):Math.max(...args));
    def('min', args => args.length===1&&Array.isArray(args[0])?Math.min(...args[0]):Math.min(...args));
    def('sum', args => {const a=args[0];if(!Array.isArray(a))throw new QError('TypeError');return a.reduce((s,v)=>s+v,0);});
    def('random', () => Math.random());
    def('randint', args => Math.floor(Math.random()*(args[1]-args[0]+1))+args[0]);
    def('print', args => { this.output(args.map(a=>this.valToStr(a)).join(' '),'stdout'); return null; });
    def('println', args => { this.output(args.map(a=>this.valToStr(a)).join(' '),'stdout'); return null; });
    def('sorted', args => {const a=[...args[0]];a.sort((a,b)=>a<b?-1:a>b?1:0);return a;});
    def('reversed', args => [...args[0]].reverse());
    def('enumerate', args => {const a=args[0];return a.map((v,i)=>[i,v]);});
    def('zip', args => {const len=Math.min(...args.map(a=>a.length));const r=[];for(let i=0;i<len;i++)r.push(args.map(a=>a[i]));return r;});
    def('map', args => {const[fn,arr]=args;return arr.map(v=>this.callValue(fn,[v]));});
    def('filter', args => {const[fn,arr]=args;return arr.filter(v=>this.isTruthy(this.callValue(fn,[v])));});
    def('reduce', args => {const[fn,arr,init]=args;return arr.reduce((acc,v)=>this.callValue(fn,[acc,v]),init);});
    def('isinstance', args => {
      const [v,t]=args;
      if(typeof t==='string'){
        if(t==='number'||t==='int'||t==='float') return typeof v==='number';
        if(t==='string'||t==='str') return typeof v==='string';
        if(t==='bool') return typeof v==='boolean';
        if(t==='array'||t==='list') return Array.isArray(v);
        if(t==='dict') return !!(v&&v._dict);
        if(t==='nil'||t==='null') return v===null||v===undefined;
      }
      return false;
    });
    def('rot13', args => {
      return String(args[0]).replace(/[a-zA-Z]/g,c=>{
        const b=c<='Z'?65:97;
        return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);
      });
    });
    def('xor_bytes', args => {
      const [s,key]=args;
      return String(s).split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^String(key).charCodeAt(i%String(key).length))).join('');
    });
    def('to_hex', args => Buffer?args[0]:Array.from(String(args[0])).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));
    def('chr', args => String.fromCharCode(args[0]));
    def('ord', args => String(args[0]).charCodeAt(0));
    def('hex', args => '0x'+Math.trunc(args[0]).toString(16));
    def('bin', args => '0b'+Math.trunc(args[0]).toString(2));
    def('oct', args => '0o'+Math.trunc(args[0]).toString(8));
    def('input', async args => {
      const prompt=args.length?this.valToStr(args[0]):'';
      return await this.inputFn(prompt);
    });

    // math module
    defObj('math', {
      'pi':()=>Math.PI,'e':()=>Math.E,'sqrt':a=>Math.sqrt(a[0]),'floor':a=>Math.floor(a[0]),
      'ceil':a=>Math.ceil(a[0]),'abs':a=>Math.abs(a[0]),'log':a=>a.length>1?Math.log(a[0])/Math.log(a[1]):Math.log(a[0]),
      'log2':a=>Math.log2(a[0]),'log10':a=>Math.log10(a[0]),'sin':a=>Math.sin(a[0]),'cos':a=>Math.cos(a[0]),
      'tan':a=>Math.tan(a[0]),'pow':a=>Math.pow(a[0],a[1]),'round':a=>Math.round(a[0]),'inf':()=>Infinity,
    });

    // console.log
    const consoleObj = {
      log:{_native:true,name:'log',fn:args=>{this.output(args.map(a=>this.valToStr(a)).join(' '),'stdout');return null;}},
      error:{_native:true,name:'error',fn:args=>{this.output(args.map(a=>this.valToStr(a)).join(' '),'stderr');return null;}},
      warn:{_native:true,name:'warn',fn:args=>{this.output(args.map(a=>this.valToStr(a)).join(' '),'warn');return null;}},
    };
    this.globals.define('console', consoleObj);
  }

  isTruthy(v) {
    if(v===null||v===undefined||v===false) return false;
    if(typeof v==='number') return v!==0;
    if(typeof v==='string') return v.length>0;
    if(Array.isArray(v)) return v.length>0;
    if(v&&v._dict) return Object.keys(v._dict).length>0;
    return true;
  }

  valToStr(v) {
    if(v===null||v===undefined) return 'nil';
    if(typeof v==='boolean') return v?'true':'false';
    if(typeof v==='number') {
      if(Number.isInteger(v)) return String(v);
      return String(v);
    }
    if(typeof v==='string') return v;
    if(Array.isArray(v)) return '['+v.map(x=>this.valToStrRepr(x)).join(', ')+']';
    if(v&&v._dict) return '{'+Object.entries(v._dict).map(([k,val])=>'"'+k+'": '+this.valToStrRepr(val)).join(', ')+'}';
    if(v&&v._inst){
      // check __str__
      const klass=v._class;
      const strMethod=this.findMethod(klass,'__str__');
      if(strMethod) {
        try{const r=this.callFn(strMethod,[],v);return this.valToStr(r);}catch(e){}
      }
      return `<${v._class?v._class.name:'instance'}>`;
    }
    if(v&&v._class) return `<class '${v._class_name||v.name||'?'}'>`;
    if(v&&v._fn) return `<function ${v.name||'lambda'}>`;
    if(v&&v._native) return `<native ${v.name}>`;
    if(v&&typeof v==='object') return JSON.stringify(v);
    return String(v);
  }

  valToStrRepr(v) {
    if(typeof v==='string') return '"'+v.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"';
    return this.valToStr(v);
  }

  async execNode(node) {
    this.step();
    if(!node) return;
    switch(node.type) {
      case 'Program': for(const s of node.stmts) await this.execNode(s); break;
      case 'Block': for(const s of node.stmts) await this.execNode(s); break;
      case 'Pass': break;
      case 'Print': {
        const vals=[];
        for(const a of node.args) vals.push(await this.evalNode(a));
        this.output(vals.map(v=>this.valToStr(v)).join(' '),'stdout');
        break;
      }
      case 'ExprStmt': await this.evalNode(node.expr); break;
      case 'VarDecl': {
        const val=node.init?await this.evalNode(node.init):null;
        this.env.define(node.name,val,node.isConst);
        break;
      }
      case 'FnDecl': {
        if(!node.name) break;
        const fn={_fn:true,name:node.name,params:node.params,defaults:node.defaults||{},paramRefs:node.paramRefs||{},body:node.body,closure:this.env};
        this.env.define(node.name,fn);
        break;
      }
      case 'ClassDecl': await this.execClass(node); break;
      case 'If': await this.execIf(node); break;
      case 'While': await this.execWhile(node); break;
      case 'For': await this.execFor(node); break;
      case 'Return': {
        const v=node.value?await this.evalNode(node.value):null;
        throw new ReturnSignal(v);
      }
      case 'Break': throw new BreakSignal();
      case 'Continue': throw new ContinueSignal();
      case 'Raise': {
        const v=await this.evalNode(node.val);
        throw new QError(this.valToStr(v));
      }
      case 'Try': await this.execTry(node); break;
    }
  }

  async execClass(node) {
    let base=null;
    if(node.base) { try{base=this.env.get(node.base);}catch(e){} }
    const klass={_class_obj:true,name:node.name,base:base?._class_obj?base:null,methods:{},staticMethods:{},staticFields:{}};
    // parse body for methods
    for(const stmt of node.body.stmts||[]) {
      if(stmt.type==='FnDecl'&&stmt.name) {
        const fn={_fn:true,name:stmt.name,params:stmt.params,defaults:stmt.defaults||{},paramRefs:stmt.paramRefs||{},body:stmt.body,closure:this.env};
        if(stmt.isStatic) klass.staticMethods[stmt.name]=fn;
        else klass.methods[stmt.name]=fn;
      }
    }
    const classVal={_class:true,_class_obj:true,name:node.name,...klass};
    this.env.define(node.name, classVal);
  }

  async execIf(node) {
    if(this.isTruthy(await this.evalNode(node.cond))) {
      await this.execBlock(node.then);
    } else {
      for(const elif of node.elifs||[]) {
        if(this.isTruthy(await this.evalNode(elif.cond))){await this.execBlock(elif.body);return;}
      }
      if(node.else) await this.execBlock(node.else);
    }
  }

  async execWhile(node) {
    let iters=0;
    while(this.isTruthy(await this.evalNode(node.cond))) {
      this.step();
      if(++iters>500000) throw new QError('RuntimeError: Infinite loop detected');
      try { await this.execBlock(node.body); }
      catch(e){ if(e instanceof BreakSignal)break; if(e instanceof ContinueSignal)continue; throw e; }
    }
  }

  async execFor(node) {
    const iter=await this.evalNode(node.iter);
    const items=Array.isArray(iter)?iter:
                (iter&&iter._dict)?Object.entries(iter._dict).map(([k,v])=>[k,v]):
                typeof iter==='string'?[...iter]:[];
    for(const item of items) {
      this.step();
      const env=new Environment(this.env);
      if(node.vars.length===1) env.define(node.vars[0],item);
      else if(node.vars.length===2&&Array.isArray(item)){env.define(node.vars[0],item[0]);env.define(node.vars[1],item[1]);}
      else env.define(node.vars[0],item);
      const prev=this.env; this.env=env;
      try { await this.execBlock(node.body); }
      catch(e){ this.env=prev; if(e instanceof BreakSignal)break; if(e instanceof ContinueSignal)continue; throw e; }
      this.env=prev;
    }
  }

  async execTry(node) {
    try { await this.execBlock(node.tryBody); }
    catch(e) {
      if(e instanceof ReturnSignal||e instanceof BreakSignal||e instanceof ContinueSignal) throw e;
      if(node.catchBody) {
        const env=new Environment(this.env);
        if(node.catchVar) env.define(node.catchVar, e.message||String(e));
        const prev=this.env; this.env=env;
        try { await this.execBlock(node.catchBody); } finally { this.env=prev; }
      }
    } finally {
      if(node.finallyBody) await this.execBlock(node.finallyBody);
    }
  }

  async execBlock(block) {
    const env=new Environment(this.env);
    const prev=this.env; this.env=env;
    try { await this.execNode(block); }
    finally { this.env=prev; }
  }

  async evalNode(node) {
    this.step();
    if(!node) return null;
    switch(node.type) {
      case 'Num': return node.val;
      case 'Str': return node.val;
      case 'Bool': return node.val;
      case 'Nil': return null;
      case 'Template': return await this.evalTemplate(node);
      case 'Ident': return this.evalIdent(node);
      case 'Array': return await Promise.all(node.items.map(i=>this.evalNode(i)));
      case 'Dict': return await this.evalDict(node);
      case 'Binary': return await this.evalBinary(node);
      case 'Unary': return await this.evalUnary(node);
      case 'Assign': return await this.evalAssign(node);
      case 'Ternary': return this.isTruthy(await this.evalNode(node.cond))?await this.evalNode(node.then):await this.evalNode(node.else);
      case 'Call': return await this.evalCall(node);
      case 'MethodCall': return await this.evalMethodCall(node);
      case 'Member': return await this.evalMember(node);
      case 'Index': return await this.evalIndex(node);
      case 'Slice': return await this.evalSlice(node);
      case 'ListComp': return await this.evalListComp(node);
      case 'Lambda': return {_fn:true,name:node.name||'lambda',params:node.params,defaults:{},paramRefs:{},body:node.body,closure:this.env,isLambdaExpr:true};
      case 'FnDecl': return {_fn:true,name:node.name||'lambda',params:node.params,defaults:node.defaults||{},paramRefs:node.paramRefs||{},body:node.body,closure:this.env};
      case 'PostIncDec': return await this.evalPostIncDec(node);
      case 'AddrOf': return await this.evalAddrOf(node);
      case 'Deref': return await this.evalDeref(node);
      case 'Arrow': return await this.evalArrow(node);
      case 'New': return await this.evalNew(node);
      case 'Super': return await this.evalSuper(node);
      case 'CoutExpr': {
        const parts=[];
        for(const a of node.args) parts.push(await this.evalNode(a));
        this.output(parts.map(p=>this.valToStr(p)).join(''),'stdout');
        return null;
      }
      case 'InputExpr': {
        const prompt=node.prompt?this.valToStr(await this.evalNode(node.prompt)):'';
        return await this.inputFn(prompt);
      }
      default: return null;
    }
  }

  evalIdent(node) {
    const name=node.name;
    if(name==='endl') return '\n';
    if(name==='true'||name==='True') return true;
    if(name==='false'||name==='False') return false;
    if(name==='nil'||name==='null'||name==='None'||name==='undefined') return null;
    if(name==='PI'||name==='M_PI') return Math.PI;
    if(name==='Infinity'||name==='inf') return Infinity;
    if(name==='NaN') return NaN;
    if(name==='console') return this.globals.has('console')?this.globals.get('console'):null;
    try { return this.env.get(name); } catch(e) { throw new QError(e.message); }
  }

  async evalTemplate(node) {
    let result='';
    for(const part of node.parts) {
      if(!part.isExpr) result+=part.val;
      else {
        const subTokens=tokenize(part.val);
        const ast=new Parser(subTokens).parse();
        let val=null;
        for(const s of ast.stmts){if(s.type==='ExprStmt')val=await this.evalNode(s.expr);}
        result+=this.valToStr(val);
      }
    }
    return result;
  }

  async evalDict(node) {
    const d={_dict:{}};
    for(const {key,val} of node.pairs) {
      const k=await this.evalNode(key);
      const v=await this.evalNode(val);
      d._dict[String(k)]=v;
    }
    return d;
  }

  async evalBinary(node) {
    const op=node.op;
    if(op==='&&') return this.isTruthy(await this.evalNode(node.left))?await this.evalNode(node.right):false;
    if(op==='||') return this.isTruthy(await this.evalNode(node.left))?true:await this.evalNode(node.right);
    if(op==='??') { const l=await this.evalNode(node.left); return (l===null||l===undefined)?await this.evalNode(node.right):l; }
    const l=await this.evalNode(node.left);
    const r=await this.evalNode(node.right);
    switch(op) {
      case '+': if(typeof l==='string'||typeof r==='string') return this.valToStr(l)+this.valToStr(r); return l+r;
      case '-': return l-r;
      case '*': return Array.isArray(l)&&typeof r==='number'?Array(r).fill(null).flatMap(()=>[...l]):l*r;
      case '/': if(r===0) throw new QError('RuntimeError: Division by zero'); return l/r;
      case '%': return l%r;
      case '**': return Math.pow(l,r);
      case '//': return Math.floor(l/r);
      case '==': return l===r||(l==null&&r==null);
      case '!=': return l!==r;
      case '<': return l<r;
      case '>': return l>r;
      case '<=': return l<=r;
      case '>=': return l>=r;
      case '&': return (l|0)&(r|0);
      case '|': return (l|0)|(r|0);
      case '^': return (l|0)^(r|0);
      case '<<': return (l|0)<<(r|0);
      case '>>': return (l|0)>>(r|0);
      case 'in':
        if(Array.isArray(r)) return r.some(x=>x===l||(x==null&&l==null));
        if(r&&r._dict) return l in r._dict;
        if(typeof r==='string'&&typeof l==='string') return r.includes(l);
        return false;
      default: return null;
    }
  }

  async evalUnary(node) {
    const v=await this.evalNode(node.operand);
    switch(node.op){
      case '-': return -v;
      case '!': return !this.isTruthy(v);
      case '~': return ~(v|0);
    }
    return v;
  }

  async evalAssign(node) {
    const val=await this.evalNode(node.right);
    await this.setLValue(node.left, val, node.op);
    return val;
  }

  async setLValue(target, val, op) {
    const applyOp=(cur,v)=>{
      switch(op){case'+=':return typeof cur==='string'?cur+this.valToStr(v):cur+v;case'-=':return cur-v;case'*=':return cur*v;case'/=':return cur/v;case'%=':return cur%v;default:return v;}
    };
    if(target.type==='Ident') {
      const name=target.name;
      if(op==='=') { if(this.env.has(name)) this.env.set(name,val); else this.env.define(name,val); }
      else { const cur=this.env.get(name); this.env.set(name,applyOp(cur,val)); }
    } else if(target.type==='Index') {
      const obj=await this.evalNode(target.obj);
      const idx=await this.evalNode(target.index);
      if(Array.isArray(obj)) {
        const i=idx<0?obj.length+idx:idx;
        obj[i]=op==='='?val:applyOp(obj[i],val);
      } else if(obj&&obj._dict) {
        obj._dict[String(idx)]=op==='='?val:applyOp(obj._dict[String(idx)],val);
      }
    } else if(target.type==='Member') {
      const obj=await this.evalNode(target.obj);
      const name=target.name;
      if(obj&&obj._inst) obj._inst[name]=op==='='?val:applyOp(obj._inst[name]??null,val);
      else if(obj&&typeof obj==='object') obj[name]=op==='='?val:applyOp(obj[name]??null,val);
    } else if(target.type==='Deref') {
      // *ptr = val — update pointed variable
      const ptr=await this.evalNode(target.operand);
      if(ptr&&ptr._ptr) { if(op==='=')ptr._cell.val=val; else ptr._cell.val=applyOp(ptr._cell.val,val); }
      else throw new QError('RuntimeError: Cannot dereference non-pointer');
    }
  }

  async evalCall(node) {
    const callee=await this.evalNode(node.callee);
    const args=[];
    for(const a of node.args) args.push(await this.evalNode(a));
    return await this.callValue(callee, args);
  }

  async callValue(callee, args) {
    if(callee===null||callee===undefined) throw new QError('TypeError: Cannot call nil');
    if(callee._native) return await callee.fn(args);
    if(callee._fn) return await this.callFn(callee, args);
    if(callee._class) return await this.instantiate(callee, args);
    if(callee._class_obj) return await this.instantiate(callee, args);
    throw new QError(`TypeError: '${this.valToStr(callee)}' is not callable`);
  }

  async callFn(fn, args, thisVal=null) {
    const env=new Environment(fn.closure||this.globals);
    if(thisVal) { env.define('self',thisVal); env.define('this',thisVal); }
    for(let i=0;i<fn.params.length;i++) {
      const pname=fn.params[i];
      let val=i<args.length?args[i]:null;
      if((val===null||val===undefined)&&fn.defaults&&fn.defaults[pname]!==undefined) {
        val=await this.evalNode(fn.defaults[pname]);
      }
      env.define(pname,val);
    }
    const prev=this.env; this.env=env;
    try {
      if(fn.isLambdaExpr) { const r=await this.evalNode(fn.body); this.env=prev; return r; }
      await this.execNode(fn.body);
      this.env=prev; return null;
    } catch(e) {
      this.env=prev;
      if(e instanceof ReturnSignal) return e.value;
      throw e;
    }
  }

  findMethod(klass, name) {
    if(!klass) return null;
    if(klass.methods&&klass.methods[name]) return klass.methods[name];
    if(klass.base) return this.findMethod(klass.base,name);
    return null;
  }

  async instantiate(klass, args) {
    const inst={_inst:true,_class:klass};
    // run init
    const initFn=this.findMethod(klass,'init')||this.findMethod(klass,'__init__');
    if(initFn) await this.callFn(initFn,args,inst);
    return inst;
  }

  async evalMethodCall(node) {
    const obj=await this.evalNode(node.obj);
    const name=node.name;
    const args=[];
    for(const a of node.args) args.push(await this.evalNode(a));

    // instance method
    if(obj&&obj._inst) {
      // check instance fields first (callable)
      if(obj._inst[name]!==undefined) return await this.callValue(obj._inst[name],args);
      const method=this.findMethod(obj._class,name);
      if(method) return await this.callFn(method,args,obj);
      throw new QError(`AttributeError: '${obj._class?.name}' has no method '${name}'`);
    }
    // class static
    if(obj&&obj._class_obj) {
      if(obj.staticMethods&&obj.staticMethods[name]) return await this.callFn(obj.staticMethods[name],args);
      throw new QError(`AttributeError: class '${obj.name}' has no static method '${name}'`);
    }
    // string methods
    if(typeof obj==='string') return this.callStringMethod(obj,name,args);
    // array methods
    if(Array.isArray(obj)) return this.callArrayMethod(obj,name,args);
    // dict methods
    if(obj&&obj._dict) return this.callDictMethod(obj,name,args);
    // math module
    if(obj&&typeof obj==='object'&&!obj._dict&&!obj._inst) {
      if(obj[name]) {
        if(obj[name]._native) return obj[name].fn(args);
        if(typeof obj[name]==='function') return obj[name](args);
        return obj[name]; // property
      }
    }
    throw new QError(`TypeError: Cannot call method '${name}' on ${typeof obj}`);
  }

  callStringMethod(s, name, args) {
    switch(name) {
      case 'upper': return s.toUpperCase();
      case 'lower': return s.toLowerCase();
      case 'strip': case 'trim': return s.trim();
      case 'lstrip': return s.trimStart();
      case 'rstrip': return s.trimEnd();
      case 'split': return s.split(args[0]!==undefined?String(args[0]):'');
      case 'join': return Array.isArray(args[0])?args[0].map(v=>this.valToStr(v)).join(s):s;
      case 'replace': return s.split(String(args[0])).join(String(args[1]));
      case 'contains': case 'includes': return s.includes(String(args[0]));
      case 'startswith': case 'startsWith': return s.startsWith(String(args[0]));
      case 'endswith': case 'endsWith': return s.endsWith(String(args[0]));
      case 'find': case 'indexOf': return s.indexOf(String(args[0]));
      case 'count': return s.split(String(args[0])).length-1;
      case 'substr': case 'substring': return s.substr(args[0]||0,args[1]);
      case 'slice': return s.slice(args[0],args[1]);
      case 'len': case 'length': return s.length;
      case 'isdigit': return /^\d+$/.test(s);
      case 'isalpha': return /^[a-zA-Z]+$/.test(s);
      case 'isalnum': return /^[a-zA-Z0-9]+$/.test(s);
      case 'format': {
        let r=s;
        args.forEach((v,i)=>r=r.replace('{}',this.valToStr(v)).replace('{'+i+'}',this.valToStr(v)));
        return r;
      }
      case 'encode': return s; // simplified
      case 'zfill': return s.padStart(args[0]||0,'0');
      case 'ljust': return s.padEnd(args[0]||0,args[1]||' ');
      case 'rjust': return s.padStart(args[0]||0,args[1]||' ');
      case 'center': return s.padStart(Math.floor((args[0]-s.length)/2)+(args[0]||0),args[1]||' ').padEnd(args[0]||0,args[1]||' ');
      case 'title': return s.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase());
      case 'capitalize': return s[0].toUpperCase()+s.slice(1).toLowerCase();
      case 'rot13': return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);});
      default: throw new QError(`AttributeError: string has no method '${name}'`);
    }
  }

  callArrayMethod(arr, name, args) {
    switch(name) {
      case 'append': case 'push': arr.push(args[0]); return null;
      case 'pop': return arr.pop()??null;
      case 'shift': return arr.shift()??null;
      case 'unshift': case 'prepend': arr.unshift(args[0]); return null;
      case 'insert': arr.splice(args[0],0,args[1]); return null;
      case 'remove': { const i=arr.findIndex(v=>v===args[0]); if(i>=0)arr.splice(i,1); return null; }
      case 'sort': arr.sort((a,b)=>a<b?-1:a>b?1:0); return null;
      case 'reverse': arr.reverse(); return null;
      case 'contains': case 'includes': return arr.some(v=>v===args[0]||(v===null&&args[0]===null));
      case 'len': case 'length': return arr.length;
      case 'indexOf': case 'find': return arr.findIndex(v=>v===args[0]);
      case 'join': return arr.map(v=>this.valToStr(v)).join(args[0]!==undefined?String(args[0]):'');
      case 'map': return arr.map(v=>this.callValue(args[0],[v]));
      case 'filter': return arr.filter(v=>this.isTruthy(this.callValue(args[0],[v])));
      case 'slice': return arr.slice(args[0],args[1]);
      case 'concat': case 'extend': return [...arr,...(args[0]||[])];
      case 'copy': return [...arr];
      case 'clear': arr.splice(0,arr.length); return null;
      case 'sum': return arr.reduce((s,v)=>s+(typeof v==='number'?v:0),0);
      case 'min': return Math.min(...arr);
      case 'max': return Math.max(...arr);
      case 'count': return arr.filter(v=>v===args[0]).length;
      default: throw new QError(`AttributeError: array has no method '${name}'`);
    }
  }

  callDictMethod(d, name, args) {
    switch(name) {
      case 'keys': return Object.keys(d._dict);
      case 'values': return Object.values(d._dict);
      case 'items': return Object.entries(d._dict).map(([k,v])=>[k,v]);
      case 'get': return d._dict[String(args[0])]??args[1]??null;
      case 'has': case 'contains': return String(args[0]) in d._dict;
      case 'delete': case 'remove': { delete d._dict[String(args[0])]; return null; }
      case 'len': case 'length': return Object.keys(d._dict).length;
      case 'update': if(args[0]&&args[0]._dict) Object.assign(d._dict,args[0]._dict); return null;
      case 'copy': return {_dict:{...d._dict}};
      case 'clear': for(const k in d._dict) delete d._dict[k]; return null;
      default: throw new QError(`AttributeError: dict has no method '${name}'`);
    }
  }

  async evalMember(node) {
    const obj=await this.evalNode(node.obj);
    const name=node.name;
    if(obj===null||obj===undefined) throw new QError(`AttributeError: Cannot access '${name}' on nil`);
    if(obj&&obj._inst) {
      if(name in (obj._inst)) return obj._inst[name];
      // check methods
      const m=this.findMethod(obj._class,name);
      if(m) return {_fn:true,...m,_boundTo:obj};
      throw new QError(`AttributeError: '${obj._class?.name}' has no attribute '${name}'`);
    }
    if(obj&&obj._class_obj) {
      if(obj.staticMethods&&name in obj.staticMethods) return obj.staticMethods[name];
      if(obj.staticFields&&name in obj.staticFields) return obj.staticFields[name];
      return obj[name]??null;
    }
    if(typeof obj==='string') { if(name==='length') return obj.length; }
    if(Array.isArray(obj)) { if(name==='length') return obj.length; }
    if(obj&&typeof obj==='object') return obj[name]??null;
    return null;
  }

  async evalIndex(node) {
    const obj=await this.evalNode(node.obj);
    const idx=await this.evalNode(node.index);
    if(Array.isArray(obj)) {
      const i=typeof idx==='number'?(idx<0?obj.length+idx:idx):parseInt(idx);
      if(i<0||i>=obj.length) throw new QError(`IndexError: index ${i} out of range`);
      return obj[i]??null;
    }
    if(typeof obj==='string') {
      const i=typeof idx==='number'?(idx<0?obj.length+idx:idx):parseInt(idx);
      return obj[i]??null;
    }
    if(obj&&obj._dict) return obj._dict[String(idx)]??null;
    throw new QError(`TypeError: Cannot index ${typeof obj}`);
  }

  async evalSlice(node) {
    const obj=await this.evalNode(node.obj);
    const arr=Array.isArray(obj)?obj:typeof obj==='string'?[...obj]:[];
    const len=arr.length;
    let start=node.start?await this.evalNode(node.start):0;
    let stop=node.stop?await this.evalNode(node.stop):len;
    let step=node.step?await this.evalNode(node.step):1;
    if(start<0)start=Math.max(0,len+start);
    if(stop<0)stop=Math.max(0,len+stop);
    start=Math.min(Math.max(0,start),len);
    stop=Math.min(Math.max(0,stop),len);
    const r=[];
    if(step>0){for(let i=start;i<stop;i+=step)r.push(arr[i]);}
    else{for(let i=start;i>stop;i+=step)r.push(arr[i]);}
    return typeof obj==='string'?r.join(''):r;
  }

  async evalListComp(node) {
    const iter=await this.evalNode(node.iter);
    const items=Array.isArray(iter)?iter:(iter&&iter._dict)?Object.entries(iter._dict).map(([k,v])=>[k,v]):[];
    const result=[];
    for(const item of items) {
      this.step();
      const env=new Environment(this.env);
      if(node.vars.length===1) env.define(node.vars[0],item);
      else if(node.vars.length===2&&Array.isArray(item)){env.define(node.vars[0],item[0]);env.define(node.vars[1],item[1]);}
      const prev=this.env; this.env=env;
      try {
        if(!node.cond||this.isTruthy(await this.evalNode(node.cond))) {
          result.push(await this.evalNode(node.expr));
        }
      } finally { this.env=prev; }
    }
    return result;
  }

  async evalPostIncDec(node) {
    const cur=await this.evalNode(node.operand);
    const newVal=node.op==='++'?cur+1:cur-1;
    await this.setLValue(node.operand,newVal,'=');
    return cur;
  }

  async evalAddrOf(node) {
    // Simulate pointer with a cell object
    const name=node.operand.type==='Ident'?node.operand.name:null;
    const val=await this.evalNode(node.operand);
    const cell={val};
    const addr='0x'+Math.floor(0x7ffe00000000+Math.random()*0xFFFF).toString(16).toUpperCase();
    return {_ptr:true,_cell:cell,_name:name,_addr:addr};
  }

  async evalDeref(node) {
    const ptr=await this.evalNode(node.operand);
    if(ptr===null||ptr===undefined) throw new QError('RuntimeError: Null pointer dereference');
    if(ptr._ptr) return ptr._cell.val;
    throw new QError('RuntimeError: Cannot dereference non-pointer');
  }

  async evalArrow(node) {
    const ptr=await this.evalNode(node.obj);
    if(ptr===null||ptr===undefined) throw new QError('RuntimeError: Null pointer dereference');
    const obj=ptr._ptr?ptr._cell.val:ptr;
    if(obj&&obj._inst) return obj._inst[node.name]??null;
    if(obj&&typeof obj==='object') return obj[node.name]??null;
    throw new QError(`TypeError: Cannot use -> on ${typeof obj}`);
  }

  async evalNew(node) {
    try {
      const klass=this.env.get(node.cls);
      const args=[];
      for(const a of node.args) args.push(await this.evalNode(a));
      return await this.instantiate(klass, args);
    } catch(e) { throw new QError(`NameError: class '${node.cls}' not found`); }
  }

  async evalSuper(node) {
    // super() call from within a class method — handled via 'self' + base class init
    const self=this.env.has('self')?this.env.get('self'):null;
    if(!self||!self._class) throw new QError('RuntimeError: super() outside class');
    const base=self._class.base;
    if(!base) throw new QError('RuntimeError: class has no base class');
    const initFn=this.findMethod(base,'init')||this.findMethod(base,'__init__');
    if(!initFn) return null;
    const args=[];
    for(const a of node.args) args.push(await this.evalNode(a));
    return await this.callFn(initFn,args,self);
  }
}

//  SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════════════════════
function highlight(code) {
  const lines=code.split('\n');
  return lines.map(line=>highlightLine(line)).join('\n');
}

function highlightLine(line) {
  // escape HTML first
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let result='',i=0;
  while(i<line.length){
    // comment
    if(line[i]==='#'||(line[i]==='/'&&line[i+1]==='/')){
      result+=`<span class="hl-cm">${esc(line.slice(i))}</span>`;
      break;
    }
    // string
    if(line[i]==='"'||line[i]==="'"){
      const q=line[i];let s=q,j=i+1;
      while(j<line.length&&line[j]!==q){if(line[j]==='\\')s+=esc(line[j++]);s+=esc(line[j++]||'');}
      s+=q;j++;
      result+=`<span class="hl-str">${s}</span>`;
      i=j;continue;
    }
    // template
    if(line[i]==='`'){
      let s='`',j=i+1;
      while(j<line.length&&line[j]!=='`'){s+=esc(line[j++]);}
      s+='`';j++;
      result+=`<span class="hl-str">${s}</span>`;
      i=j;continue;
    }
    // number
    if(/[0-9]/.test(line[i])||(line[i]==='.'&&/[0-9]/.test(line[i+1]||''))){
      let n='',j=i;
      if(line[j]==='0'&&(line[j+1]==='x'||line[j+1]==='X')){n+=line[j++];n+=line[j++];while(/[0-9a-fA-F]/.test(line[j]))n+=line[j++];}
      else{while(j<line.length&&(/[0-9.]/.test(line[j])))n+=line[j++];}
      result+=`<span class="hl-num">${esc(n)}</span>`;
      i=j;continue;
    }
    // identifier/keyword
    if(/[a-zA-Z_$]/.test(line[i])){
      let id='',j=i;
      while(j<line.length&&/[a-zA-Z0-9_$]/.test(line[j]))id+=line[j++];
      const kwClass=KEYWORDS.has(id)?'hl-kw':
        (id==='self'||id==='this')?'hl-self':
        TYPE_KW.has(id)?'hl-type':
        (j<line.length&&line[j]==='(')?'hl-fn':'hl-id';
      result+=`<span class="${kwClass}">${esc(id)}</span>`;
      i=j;continue;
    }
    // operator
    if('+-*/%=<>!&|^~'.includes(line[i])){
      result+=`<span class="hl-op">${esc(line[i])}</span>`;
      i++;continue;
    }
    result+=esc(line[i]);
    i++;
  }
  return result;
}
